name: Bug report
description: Report a reproducible public-core defect.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, proxy secrets, database URLs, or customer data. Report security issues privately through SECURITY.md."
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options: [Local Docker, Self-hosted production, GitHub Actions CI]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. Run ...\n2. Open ...\n3. Observe ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour and redacted logs
    validations:
      required: true
