name: public-core-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: verblayer
          POSTGRES_PASSWORD: verblayer
          POSTGRES_DB: verblayer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U verblayer -d verblayer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://verblayer:verblayer@localhost:5432/verblayer
      APP_BASE_URL: http://localhost:3100
      AUTH_MODE: dev
      DEV_AUTH_ENABLED: "true"
      INTERNAL_EXECUTION_TOKEN: ci-internal-execution-token-at-least-32
      DISCOVERY_PROVIDER: openai
      OPENAI_MODEL: gpt-4.1-mini
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify public core
        run: pnpm verify:ci
