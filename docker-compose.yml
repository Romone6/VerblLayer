services:
  postgres:
    image: postgres:16
    container_name: callable-postgres
    environment:
      POSTGRES_USER: callable
      POSTGRES_PASSWORD: callable
      POSTGRES_DB: callable
    ports:
      - "55432:5432"
    volumes:
      - callable_pg_data:/var/lib/postgresql/data
volumes:
  callable_pg_data:
    # ponytail: retain the pre-rebrand Docker volume so existing local records stay mounted; migrate only when storage separation is explicitly needed.
    name: verblayer_pg_data
